services:
  cache-db:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"

  api-server:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - REDIS_URL=redis://cache-db:6379
    depends_on:
      - cache-db

  frontend:
    build: ./frontend
    ports:
      - "5173:3000" # Ensure your frontend internal port matches (usually 3000 or 5173)
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - WDS_SOCKET_PORT=0
    depends_on:
      - api-server